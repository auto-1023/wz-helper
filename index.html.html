<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者 Pro 对账系统 - 离线持久化版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f1f5f9; --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; }

        /* 侧边栏 */
        .sidebar { width: 240px; background: #1e293b; color: white; padding: 25px; position: fixed; height: 100vh; }
        .main { margin-left: 240px; flex: 1; padding: 30px; }

        /* 通用卡片样式 */
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 统计数字 */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card h3 { font-size: 14px; color: #64748b; margin-bottom: 8px; }
        .stat-card p { font-size: 28px; font-weight: 800; }

        /* 表格控制 */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 12px; background: #f8fafc; color: #475569; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        /* 按钮与交互 */
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-export { background: #64748b; color: white; }

        /* 弹窗样式 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:999; }
        .modal-body { background: white; padding: 30px; border-radius: 16px; width: 400px; }
        .form-input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #cbd5e1; border-radius: 8px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-done { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-size: 22px; margin-bottom: 40px;"><i class="fas fa-gem" style="color:var(--primary)"></i> 王者助手V3</h2>
    <div style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">管理菜单</div>
    <div style="background: var(--primary); padding: 12px; border-radius: 8px; margin-bottom: 10px;"><i class="fas fa-home"></i> 控制台</div>
</div>

<div class="main">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>财务对账看板</h1>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-export" onclick="exportToCSV()"><i class="fas fa-file-download"></i> 导出 CSV</button>
            <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> 新增账单</button>
        </div>
    </header>

    <div class="stat-grid">
        <div class="card stat-card"><h3>累计成交额</h3><p id="totalRevenue">¥0.00</p></div>
        <div class="card stat-card"><h3>待付主播款</h3><p id="totalDebt" style="color: var(--warning)">¥0.00</p></div>
        <div class="card stat-card"><h3>预估净利润</h3><p id="totalProfit" style="color: var(--success)">¥0.00</p></div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 20px;">最近 10 笔明细</h3>
        <table id="orderTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>主播</th>
                    <th>代打项目</th>
                    <th>总价</th>
                    <th>主播提成(70%)</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="orderModal">
    <div class="modal-body">
        <h2 style="margin-bottom: 20px;">添加新订单</h2>
        <label>主播姓名</label>
        <input type="text" id="pName" class="form-input" placeholder="输入主播ID">
        <label>代打项目</label>
        <input type="text" id="pDetail" class="form-input" placeholder="如：星耀-王者">
        <label>订单总额 (元)</label>
        <input type="number" id="pPrice" class="form-input" placeholder="输入收到的总金额">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex:1; justify-content: center;" onclick="saveOrder()">保存订单</button>
            <button class="btn btn-export" style="flex:1; justify-content: center;" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
    // 核心数据逻辑：尝试从本地存储读取数据，如果没有则为空数组
    let orders = JSON.parse(localStorage.getItem('wz_orders')) || [];

    // 初始化渲染
    function init() {
        renderTable();
        updateStats();
    }

    // 打开/关闭弹窗
    function openModal() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    // 保存订单到本地
    function saveOrder() {
        const name = document.getElementById('pName').value;
        const detail = document.getElementById('pDetail').value;
        const price = parseFloat(document.getElementById('pPrice').value);

        if(!name || !price) return alert("请填写完整！");

        const newOrder = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            name: name,
            detail: detail,
            price: price,
            share: (price * 0.7).toFixed(2),
            status: '待结算'
        };

        orders.unshift(newOrder); // 添加到开头
        syncData(); // 同步到本地存储
        closeModal();
        renderTable();
        updateStats();

        // 清空表单
        document.getElementById('pName').value = '';
        document.getElementById('pDetail').value = '';
        document.getElementById('pPrice').value = '';
    }

    // 同步到 LocalStorage
    function syncData() {
        localStorage.setItem('wz_orders', JSON.stringify(orders));
    }

    // 渲染表格
    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = orders.map((o, index) => `
            <tr>
                <td style="color:#94a3b8">${o.date}</td>
                <td><strong>${o.name}</strong></td>
                <td>${o.detail}</td>
                <td>¥${o.price}</td>
                <td style="color:var(--primary); font-weight:bold;">¥${o.share}</td>
                <td><span class="badge ${o.status==='已结算'?'badge-done':'badge-pending'}" onclick="toggleStatus(${index})" style="cursor:pointer">${o.status}</span></td>
                <td><i class="fas fa-trash-alt" onclick="deleteOrder(${index})" style="color:var(--danger); cursor:pointer"></i></td>
            </tr>
        `).join('');
    }

    // 更新统计
    function updateStats() {
        const total = orders.reduce((sum, o) => sum + o.price, 0);
        const debt = orders.filter(o => o.status === '待结算').reduce((sum, o) => sum + parseFloat(o.share), 0);
        const profit = total * 0.3;

        document.getElementById('totalRevenue').innerText = `¥${total.toFixed(2)}`;
        document.getElementById('totalDebt').innerText = `¥${debt.toFixed(2)}`;
        document.getElementById('totalProfit').innerText = `¥${profit.toFixed(2)}`;
    }

    // 切换订单状态
    function toggleStatus(index) {
        orders[index].status = orders[index].status === '待结算' ? '已结算' : '待结算';
        syncData();
        renderTable();
        updateStats();
    }

    // 删除订单
    function deleteOrder(index) {
        if(confirm("确定要删除这条记录吗？数据无法恢复。")) {
            orders.splice(index, 1);
            syncData();
            renderTable();
            updateStats();
        }
    }

    // 导出为 CSV (可用 Excel 直接打开)
    function exportToCSV() {
        if(orders.length === 0) return alert("没有数据可以导出");
        let csvContent = "日期,主播,项目,总价,主播分成,状态\n";
        orders.forEach(o => {
            csvContent += `${o.date},${o.name},${o.detail},${o.price},${o.share},${o.status}\n`;
        });
        
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `王者代打对账单_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    window.onload = init;
</script>

</body>
</html>
